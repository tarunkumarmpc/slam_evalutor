name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-dryrun:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup ROS Workspace
        run: |
          mkdir -p ~/ros2_ws/src
          ln -s $GITHUB_WORKSPACE ~/ros2_ws/src/slam_evaluator
          cd ~/ros2_ws
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y --skip-keys="visual_graph_slam"

      - name: Build Workspace
        run: |
          cd ~/ros2_ws
          source /opt/ros/humble/setup.bash
          colcon build --packages-select slam_evaluator

      - name: Run dry-run evaluation
        run: |
          cd ~/ros2_ws
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          ros2 launch slam_evaluator evaluate.launch.py \
            dataset:=$GITHUB_WORKSPACE/datasets/kitti_0033.yaml \
            report_dir:=$GITHUB_WORKSPACE/tmp_reports \
            dry_run:=true

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: dryrun-report
          path: tmp_reports
