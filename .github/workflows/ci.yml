name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-dryrun:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup ROS Workspace
        run: |
          mkdir -p ~/ros2_ws/src
          ln -s $GITHUB_WORKSPACE ~/ros2_ws/src/slam_evaluator
          cd ~/ros2_ws
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y --skip-keys="visual_graph_slam"

      - name: Build Workspace
        run: |
          cd ~/ros2_ws
          source /opt/ros/humble/setup.bash
          colcon build --packages-select slam_evaluator

      - name: Generate Test Bag
        run: |
          cd $GITHUB_WORKSPACE/datasets
          source /opt/ros/humble/setup.bash
          python3 generate_test_bag.py

      - name: Run full evaluation on test bag
        run: |
          cd ~/ros2_ws
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          ros2 launch slam_evaluator evaluate.launch.py \
            dataset:=$GITHUB_WORKSPACE/datasets/test_bag.yaml \
            report_dir:=$GITHUB_WORKSPACE/tmp_reports \
            dry_run:=false

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-report
          path: tmp_reports

      - name: Prepare results folder
        run: |
          mkdir -p $GITHUB_WORKSPACE/results/latest_ci_run
          cp -r $GITHUB_WORKSPACE/tmp_reports/*/* $GITHUB_WORKSPACE/results/latest_ci_run/

      - name: Commit and Push Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update CI evaluation results [skip ci]"
          file_pattern: "results/latest_ci_run/*"
